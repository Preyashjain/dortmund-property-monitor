services:
  - type: worker
    name: dortmund-property-monitor
    runtime: docker
    region: frankfurt
    plan: free
    autoDeploy: true
    envVars:
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: TO_EMAIL
        sync: false
      - key: CHECK_INTERVAL_MINUTES
        value: "5"
